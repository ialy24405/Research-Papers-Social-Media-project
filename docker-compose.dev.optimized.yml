version: "3.8"

services:
  papers-app-dev-optimized:
    build:
      context: .
      dockerfile: Dockerfile.dev.optimized
    ports:
      - "3001:3000" # Using different port to avoid conflicts
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    command: npm run dev
