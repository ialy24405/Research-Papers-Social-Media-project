version: "3.8"

services:
  papers-app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    command: npm run dev

  # Optional: Hot reloading development setup
  # papers-app-dev:
  #   image: node:18-alpine
  #   working_dir: /app
  #   ports:
  #     - "3000:3000"
  #   environment:
