version: "3.8"

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: papers-db-dev
    environment:
      POSTGRES_DB: papers_social_media_dev
      POSTGRES_USER: papers_user
      POSTGRES_PASSWORD: papers_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papers_user -d papers_social_media_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
    driver: local

networks:
  default:
    name: papers-network-dev
