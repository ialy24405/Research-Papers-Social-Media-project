version: "3.8"

services:
  # Recommended: Best balance of size and functionality (1.08GB)
  papers-app-dev-minimal:
    build:
      context: .
      dockerfile: Dockerfile.dev.minimal
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # Alternative: Multi-stage slim (1.41GB)
  papers-app-dev-slim:
    build:
      context: .
      dockerfile: Dockerfile.dev.slim
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # Ultra-slim with aggressive cleanup (1.08GB)
  papers-app-dev-ultra-slim:
    build:
      context: .
      dockerfile: Dockerfile.dev.ultra-slim
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
