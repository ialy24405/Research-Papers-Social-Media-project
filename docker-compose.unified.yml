# Docker Compose configuration for Papers Social Media Platform (Unified Structure)

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: database
    environment:
      POSTGRES_DB: papers_social_media
      POSTGRES_USER: papers_user
      POSTGRES_PASSWORD: papers_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_setup.sql:/docker-entrypoint-initdb.d/01-database-setup.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papers_user -d papers_social_media"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Unified Application (Frontend + Backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile.unified
    container_name: papers-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3005
      FRONTEND_PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: papers_social_media
      DB_USER: papers_user
      DB_PASSWORD: papers_password
      JWT_SECRET: your_super_secure_jwt_secret_key_here_change_in_production
      JWT_EXPIRES_IN: 24h
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 10485760
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_SERVER_URL: ""
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local

networks:
  default:
    name: papers-network
