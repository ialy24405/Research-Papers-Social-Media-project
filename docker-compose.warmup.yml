version: "3.8"

services:
  # Development with warmup
  papers-app-dev-warmup:
    build:
      context: .
      dockerfile: Dockerfile.dev.warmup
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - BASE_URL=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Production with warmup
  papers-app-prod-warmup:
    build:
      context: .
      dockerfile: Dockerfile.prod.warmup
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - BASE_URL=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Standard development (no warmup)
  papers-app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev.minimal
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    command: ["npm", "run", "dev"]
