# Docker Compose configuration for Papers Social Media Platform

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: database
    environment:
      POSTGRES_DB: papers_social_media
      POSTGRES_USER: papers_user
      POSTGRES_PASSWORD: papers_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_setup.sql:/docker-entrypoint-initdb.d/01-database-setup.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papers_user -d papers_social_media"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    expose:
      - "3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: papers_social_media
      DB_USER: papers_user
      DB_PASSWORD: papers_password
      JWT_SECRET: your_super_secure_jwt_secret_key_here_change_in_production
      JWT_EXPIRES_IN: 24h
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 10485760
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_SERVER_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "3000:3000"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  default:
    name: papers-network
